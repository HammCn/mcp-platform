# =====================================================
# MCP Platform 配置文件
# 开发环境配置
# =====================================================

server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful

spring:
  application:
    name: mcp-platform
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mcp_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: asdfew12345
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: McpHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
  
  # Jackson 配置
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

# 日志配置
logging:
  level:
    root: INFO
    com.mcp: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mcp-platform.log
    max-size: 100MB
    max-history: 30

# MCP 配置
mcp:
  server:
    name: MCP Platform
    version: 1.0.0
    description: MCP 服务中台
  protocol:
    version: 2024-11-05
  sse:
    enabled: true
    heartbeat-interval: 30s

# 限流配置
rate-limit:
  enabled: true
  default-limit: 100
  default-window: 60

# 认证配置
auth:
  api-key:
    enabled: true
    header-name: X-API-Key
  jwt:
    enabled: true
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration: 86400000  # 24 小时
    header-name: Authorization
    prefix: Bearer 

# 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true

# Prometheus 指标配置
management:
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
